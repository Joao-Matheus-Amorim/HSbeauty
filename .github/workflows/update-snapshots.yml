name: Update E2E Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Regenerate Playwright snapshots (Linux/Chromium)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Update snapshots
        run: npx playwright test --update-snapshots
        working-directory: frontend
        env:
          SNAPSHOT_CHANNEL: product
          ALLOW_SNAPSHOT_UPDATE: 'true'

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/e2e/
          git diff --staged --quiet || git commit -m "chore: atualizar snapshots Playwright (Linux/Chromium) [skip ci]"
          git push
