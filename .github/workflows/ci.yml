name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Test frontend
        run: npm test
        working-directory: frontend

      - name: Smoke frontend
        run: npm run test:smoke
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend Prisma validation
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ vars.CI_DATABASE_URL || 'postgresql://user:password@localhost:5432/hsbeauty_ci?schema=public' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Generate Prisma Client (schema validation)
        run: npx prisma generate --schema=prisma/schema.prisma
        working-directory: backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/hsbeauty_ci

      - name: Run backend tests
        run: npm test
        working-directory: backend

      - name: Smoke backend
        run: npm run test:smoke
        working-directory: backend

  frontend-e2e:
    name: Frontend E2E Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run frontend E2E
        run: npm run test:e2e
        working-directory: frontend
        env:
          SNAPSHOT_CHANNEL: product
